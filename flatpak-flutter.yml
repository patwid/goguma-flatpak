app-id: fr.emersion.goguma
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm22
command: goguma

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: sqlite3
    buildsystem: autotools
    sources:
      - type: archive
        url: https://www.sqlite.org/2025/sqlite-autoconf-3490100.tar.gz
        sha256: 106642d8ccb36c5f7323b64e4152e9b719f7c0215acf5bfeac3d5e7f97b59254

  - name: goguma
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/llvm22/bin:/var/lib/flutter/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm22/lib
      arch:
        aarch64:
          env:
            BUNDLE_PATH: build/linux/arm64/release/bundle
        x86_64:
          env:
            BUNDLE_PATH: build/linux/x64/release/bundle
    build-commands:
      # Redirect pub git cache bare repos to local clones so that
      # "flutter pub get --offline" doesn't try to fetch from the network.
      # Cache dir names follow the pattern "<pkg>-<hex hash>"; strip
      # the trailing hash to recover the package name for matching.
      - |
        for cache_dir in .pub-cache/git/cache/*/; do
          [ -d "$cache_dir" ] || continue
          pkg_name=$(basename "$cache_dir")
          pkg_name=${pkg_name%-*}
          local_clone=$(find .pub-cache/git -maxdepth 1 -type d -name "${pkg_name}-*" ! -path "*/cache/*" | head -1)
          if [ -n "$local_clone" ]; then
            git --git-dir="$cache_dir" remote set-url origin "$PWD/$local_clone"
          fi
        done
      - flutter config --no-analytics
      # Generated by flatpak-flutter — runs "flutter pub get --offline"
      - setup-flutter.sh
      - flutter build linux --release --no-pub
      - cp -r ${BUNDLE_PATH}/* /app/
      - mkdir -p /app/bin
      - ln -s /app/goguma /app/bin/goguma
      - install -Dm644 fr.emersion.goguma.desktop /app/share/applications/fr.emersion.goguma.desktop
      - install -Dm644 android/app/src/main/res/mipmap-mdpi/ic_launcher.png /app/share/icons/hicolor/48x48/apps/fr.emersion.goguma.png
      - install -Dm644 android/app/src/main/res/mipmap-hdpi/ic_launcher.png /app/share/icons/hicolor/72x72/apps/fr.emersion.goguma.png
      - install -Dm644 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png /app/share/icons/hicolor/96x96/apps/fr.emersion.goguma.png
      - install -Dm644 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png /app/share/icons/hicolor/192x192/apps/fr.emersion.goguma.png
      - install -Dm644 fr.emersion.goguma.metainfo.xml /app/share/metainfo/fr.emersion.goguma.metainfo.xml
    sources:
      - type: git
        url: https://codeberg.org/emersion/goguma.git
        tag: v0.9.1
        commit: 500ba75cf167afa37be69516e7ae50985c8342c0
      - type: patch
        path: disable-titlebar.patch
      - type: file
        path: fr.emersion.goguma.desktop
      - type: file
        path: fr.emersion.goguma.metainfo.xml
      - type: git
        url: https://github.com/flutter/flutter.git
        tag: 3.41.6
        commit: db50e20168db8fee486b9abf32fc912de3bc5b6a
        dest: flutter
